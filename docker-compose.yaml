services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest-backend
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/nestdb
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLIENT_ID=Ov23libU3RtnCxHrYLG9
      - CLIENT_SECRET=4ea875342e6bf6cf1a78c17e11d177ed49b78174
      - REDIRECT_URI=http://localhost:3000/auth/callback
      - JWT_SECRET=RehanSecretOfJWT
      - FRONTEND_URL=http://localhost:5173/
      - DEPLOYMENTS_DIR=/deployments
      - MACHINE_DEPLOYMENTS_PATH=D:/deployments
    volumes:
      - ${MACHINE_DEPLOYMENTS_PATH}:/deployments
      # docker host mounting to spawn processes
      - /var/run/docker.sock:/var/run/docker.sock
  postgres:
    image: postgres:18
    container_name: nest-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nest_db
    ports:
      - '5432:5432'
    volumes:
      - ./db-data:/var/lib/postgresql

  # docker exec -it nest-postgres psql -U postgres

  # docker exec -it my-redis redis-cli

  redis:
    image: redis:latest
    container_name: my-redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  deployments-data:
