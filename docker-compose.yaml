services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest-backend
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/nestdb
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - REDIRECT_URI=http://localhost:3000/auth/callback
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:5173/
      - DEPLOYMENTS_DIR=/deployments
      - MACHINE_DEPLOYMENTS_PATH=D:/deployments
      - AI_SERVICE_URL=http://ai-service:8000
    volumes:
      - ${MACHINE_DEPLOYMENTS_PATH}:/deployments
      # docker host mounting to spawn processes
      - /var/run/docker.sock:/var/run/docker.sock
  postgres:
    image: postgres:18
    container_name: nest-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nest_db
    ports:
      - '5432:5432'
    volumes:
      - ./db-data:/var/lib/postgresql

  # docker exec -it nest-postgres psql -U postgres

  # docker exec -it my-redis redis-cli

  redis:
    image: redis:latest
    container_name: my-redis
    restart: always
    ports:
      - '6379:6379'

  ai-service:
    build:
      context: /ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    restart: always
    ports:
      - '8000:8000'
    environment:
      - API_KEY=${API_KEY}

volumes:
  deployments-data:
